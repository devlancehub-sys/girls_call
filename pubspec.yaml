name: love_call_girls
description: Love Call Girls - Female host app
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.8.0+1
  socket_io_client: ^3.1.2
  zego_express_engine: 3.24.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  device_info_plus: ^12.3.0
  flutter_ringtone_player: ^4.0.0+4
  flutter_svg: ^2.2.0
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.2
  permission_handler: ^11.4.0
  vibration: ^3.2.0
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/g-icon-launcher.png
  adaptive_icon_background: "#FF2D7A"
  adaptive_icon_foreground: assets/images/g-icon-launcher.png
  background_color_ios: "#FF2D7A"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/incoming_call.mp3
    - assets/avatar_svg_girls_files/
    - assets/images/
